name: Lokavant Clinical Trial Intelligence Capabilities
description: |
  Customer-only capabilities describing Lokavant's Clinical Trial Intelligence
  Platform. Lokavant does not publish an OpenAPI spec; access is gated through
  invite-only customer accounts authenticated via Amazon Cognito with
  SAML2/OIDC federation. These capabilities are descriptive — they document
  what the platform offers sponsors and CROs, sourced from the Lokavant +
  AWS startups case study.
provider: lokavant
specification: null
created: '2026-05-23'

capabilities:
  - id: ingest-clinical-data
    name: Ingest Clinical Data
    description: Stream EDC, CTMS, IRT, eCOA, lab, and safety data through 21+ Lokavant source connectors into the Clinical Data Hub.
    access: customer-only
    backing-service: AWS S3 + Managed Apache Airflow

  - id: oversight-risk-monitoring
    name: Oversight - Risk-Based Monitoring
    description: Surface risk-based quality management alerts at study, country, site, and patient levels.
    access: customer-only
    product: Oversight

  - id: insight-benchmarking
    name: Insight - Performance Benchmarking
    description: Compare in-flight trial performance against a proprietary repository of 2,000+ harmonized prior trials and 14,000+ third-party trials.
    access: customer-only
    product: Insight

  - id: spectrum-forecasting
    name: Spectrum - Trial Forecasting
    description: Forecast enrollment and operational outcomes for in-flight trials using the Spectrum v15 solution.
    access: customer-only
    product: Spectrum

  - id: feasibility-ai
    name: Feasibility AI
    description: Run AI-driven trial feasibility analysis from strategic planning through mid-study re-forecasting.
    access: customer-only
    product: Feasibility

  - id: medical-monitoring
    name: Medical Monitoring
    description: Centralized medical-monitoring workflow surfacing safety and protocol-deviation signals.
    access: customer-only
    product: Medical Monitoring

  - id: sso-federation
    name: SSO Federation
    description: Authenticate sponsor and CRO users through Amazon Cognito with SAML2 or OIDC.
    access: customer-only
    backing-service: Amazon Cognito
