name: Datavant Healthjump EHR Capabilities
description: |
  Shared Naftiko capability set covering programmatic extraction of clinical
  records from the 70+ ambulatory EHR/PM systems connected through Datavant's
  Healthjump platform. Every capability resolves to a single OpenAPI operation
  in openapi/datavant-healthjump-ehr-openapi.yml and is governed by the OAuth2
  clientCredentials flow.
provider: datavant-healthjump
specification: openapi/datavant-healthjump-ehr-openapi.yml
created: '2026-05-23'

capabilities:
  - id: list-patients
    name: List Patients
    description: Page through standardized patient records for a connected practice, optionally filtered by modification time.
    operation: listPatients
    scopes: [read:patients]
    inputs: [client_id, modified_since, limit, cursor]
    outputs: [Patient]

  - id: get-patient
    name: Get Patient
    description: Fetch a single patient record by Healthjump patient_id.
    operation: getPatient
    scopes: [read:patients]
    inputs: [patient_id]
    outputs: [Patient]

  - id: list-encounters
    name: List Encounters
    description: Retrieve clinical encounters for a connected practice or a specific patient.
    operation: listEncounters
    scopes: [read:clinical]
    inputs: [client_id, patient_id, modified_since, limit, cursor]
    outputs: [Encounter]

  - id: list-vitals
    name: List Vitals
    description: Retrieve vital-sign measurements tied to encounters and patients.
    operation: listVitals
    scopes: [read:clinical]
    inputs: [client_id, patient_id, modified_since, limit, cursor]
    outputs: [Vitals]

  - id: list-allergies
    name: List Allergies
    description: Retrieve recorded allergies and reactions.
    operation: listAllergies
    scopes: [read:clinical]
    inputs: [client_id, patient_id, limit, cursor]
    outputs: [Allergy]

  - id: list-immunizations
    name: List Immunizations
    description: Retrieve immunization history with CVX codes.
    operation: listImmunizations
    scopes: [read:clinical]
    inputs: [client_id, patient_id, limit, cursor]
    outputs: [Immunization]

  - id: list-medications
    name: List Medications
    description: Retrieve prescribed and administered medications coded with RxNorm/NDC.
    operation: listMedications
    scopes: [read:clinical]
    inputs: [client_id, patient_id, limit, cursor]
    outputs: [Medication]

  - id: list-diagnoses
    name: List Diagnoses
    description: Retrieve ICD-10-coded diagnoses and problem list entries.
    operation: listDiagnoses
    scopes: [read:clinical]
    inputs: [client_id, patient_id, limit, cursor]
    outputs: [Diagnosis]

  - id: list-procedures
    name: List Procedures
    description: Retrieve CPT/HCPCS-coded procedures performed.
    operation: listProcedures
    scopes: [read:clinical]
    inputs: [client_id, patient_id, limit, cursor]
    outputs: [Procedure]

  - id: list-labs
    name: List Lab Results
    description: Retrieve LOINC-coded laboratory results.
    operation: listLabs
    scopes: [read:clinical]
    inputs: [client_id, patient_id, limit, cursor]
    outputs: [LabResult]

  - id: list-documents
    name: List Documents
    description: Retrieve references to unstructured clinical notes and PDFs for optional extraction.
    operation: listDocuments
    scopes: [read:clinical]
    inputs: [client_id, patient_id, limit, cursor]
    outputs: [Document]

  - id: list-appointments
    name: List Appointments
    description: Retrieve scheduled and historical appointments.
    operation: listAppointments
    scopes: [read:clinical]
    inputs: [client_id, patient_id, limit, cursor]
    outputs: [Appointment]

  - id: list-providers
    name: List Providers
    description: Retrieve the provider directory for a connected practice.
    operation: listProviders
    scopes: [read:clinical]
    inputs: [client_id]
    outputs: [Provider]

  - id: list-practices
    name: List Practices
    description: Retrieve metadata about connected practices and their source EHR systems.
    operation: listPractices
    scopes: [read:clinical]
    inputs: []
    outputs: [Practice]
